<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="slashGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C6FCD"/>
      <stop offset="100%" stop-color="#56CFE1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(124,111,205,0)"/>
      <stop offset="25%" stop-color="#7C6FCD"/>
      <stop offset="75%" stop-color="#56CFE1"/>
      <stop offset="100%" stop-color="rgba(86,207,225,0)"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="25%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#141228"/>
      <stop offset="100%" stop-color="#07070F"/>
    </radialGradient>
    <radialGradient id="slashAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B7FE8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#56CFE1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowF" x="-60%" y="-40%" width="220%" height="180%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sq">
      <rect width="400" height="400" rx="56"/>
    </clipPath>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#7C6FCD"/>
    </pattern>
  </defs>

  <!-- Fond arrondi -->
  <rect width="400" height="400" rx="56" fill="url(#bgGrad)"/>

  <!-- Grille de points -->
  <rect width="400" height="400" fill="url(#dots)" opacity="0.055" clip-path="url(#sq)"/>

  <!-- Bordure intérieure subtile -->
  <rect x="1.5" y="1.5" width="397" height="397" rx="54.5" fill="none"
    stroke="rgba(124,111,205,0.16)" stroke-width="1.5"/>

  <!-- Aura derrière le slash -->
  <ellipse cx="200" cy="180" rx="50" ry="112"
    fill="#7B6FD0" opacity="0.25"
    filter="url(#glowF)" clip-path="url(#sq)"/>

  <!-- Lettre "A" -->
  <text x="18" y="265"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="178"
    fill="white"
    opacity="0.93">A</text>

  <!-- Slash "/" — parallélogramme gradient -->
  <polygon points="218,70 251,70 191,290 158,290" fill="url(#slashGrad)"/>

  <!-- Reflet sur la tranche droite du slash -->
  <polygon points="241,70 251,70 191,290 181,290" fill="rgba(255,255,255,0.09)"/>

  <!-- Lettre "C" -->
  <text x="252" y="265"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="178"
    fill="white"
    opacity="0.93">C</text>

  <!-- Ligne de séparation gradient -->
  <rect x="44" y="300" width="312" height="1.5" rx="0.75" fill="url(#lineGrad)"/>

  <!-- Nom -->
  <text x="200" y="334"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="13"
    letter-spacing="6"
    fill="rgba(255,255,255,0.30)">AUDRIC CINNA</text>

  <!-- Trois points accent -->
  <circle cx="200" cy="362" r="2.5" fill="#56CFE1" opacity="0.75"/>
  <circle cx="186" cy="362" r="1.5" fill="#7C6FCD" opacity="0.50"/>
  <circle cx="214" cy="362" r="1.5" fill="#7C6FCD" opacity="0.50"/>
</svg>
