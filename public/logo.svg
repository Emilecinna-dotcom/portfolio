<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C6FCD"/>
      <stop offset="100%" style="stop-color:#56CFE1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#56CFE1;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7C6FCD;stop-opacity:0.1"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C6FCD;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#7C6FCD;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="200" cy="200" r="190"/>
    </clipPath>
  </defs>

  <!-- Fond sombre -->
  <circle cx="200" cy="200" r="200" fill="#07070D"/>

  <!-- Glow interne -->
  <circle cx="200" cy="200" r="200" fill="url(#glow)"/>

  <!-- Grille de points subtile -->
  <g opacity="0.08" clip-path="url(#circle-clip)">
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#7C6FCD"/>
    </pattern>
    <rect x="0" y="0" width="400" height="400" fill="url(#dots)"/>
  </g>

  <!-- Arc extérieur principal -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="340 800" stroke-dashoffset="60" opacity="0.7"/>

  <!-- Arc extérieur secondaire (opposé) -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#56CFE1" stroke-width="1" stroke-dasharray="100 800" stroke-dashoffset="-330" opacity="0.4"/>

  <!-- Anneau intérieur fin -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(124,111,205,0.12)" stroke-width="1"/>

  <!-- Points décoratifs aux extrémités des arcs -->
  <circle cx="200" cy="20" r="4" fill="#56CFE1" opacity="0.8"/>
  <circle cx="200" cy="380" r="3" fill="#7C6FCD" opacity="0.5"/>
  <circle cx="20" cy="200" r="2.5" fill="#56CFE1" opacity="0.4"/>
  <circle cx="380" cy="200" r="2.5" fill="#7C6FCD" opacity="0.4"/>

  <!-- Lignes diagonales subtiles -->
  <line x1="60" y1="60" x2="90" y2="90" stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>
  <line x1="340" y1="60" x2="310" y2="90" stroke="url(#grad1)" stroke-width="1" opacity="0.3"/>

  <!-- Lettre A -->
  <text
    x="122" y="238"
    font-family="Helvetica Neue, Arial Black, sans-serif"
    font-weight="900"
    font-size="148"
    fill="url(#grad1)"
    filter="url(#blur-glow)"
    opacity="0.15"
  >A</text>
  <text
    x="122" y="238"
    font-family="Helvetica Neue, Arial Black, sans-serif"
    font-weight="900"
    font-size="148"
    fill="url(#grad1)"
  >A</text>

  <!-- Lettre C -->
  <text
    x="208" y="238"
    font-family="Helvetica Neue, Arial Black, sans-serif"
    font-weight="900"
    font-size="148"
    fill="white"
    opacity="0.06"
    filter="url(#blur-glow)"
  >C</text>
  <text
    x="208" y="238"
    font-family="Helvetica Neue, Arial Black, sans-serif"
    font-weight="900"
    font-size="148"
    fill="white"
    opacity="0.9"
  >C</text>

  <!-- Ligne séparatrice verticale entre A et C -->
  <rect x="197" y="110" width="1.5" height="120" fill="url(#grad1)" opacity="0.5" rx="1"/>

  <!-- Nom complet en bas -->
  <text
    x="200" y="300"
    text-anchor="middle"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="300"
    font-size="18"
    letter-spacing="8"
    fill="white"
    opacity="0.5"
  >AUDRIC</text>
  <text
    x="200" y="322"
    text-anchor="middle"
    font-family="Helvetica Neue, Arial, sans-serif"
    font-weight="700"
    font-size="18"
    letter-spacing="6"
    fill="url(#grad1)"
    opacity="0.9"
  >CINNA</text>

  <!-- Petits accents bas -->
  <rect x="168" y="333" width="20" height="1.5" rx="1" fill="url(#grad1)" opacity="0.6"/>
  <rect x="212" y="333" width="20" height="1.5" rx="1" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="200" cy="333" r="2" fill="#56CFE1" opacity="0.8"/>
</svg>
